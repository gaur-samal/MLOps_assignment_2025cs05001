# Heart Disease Prediction - CI/CD Pipeline
# GitHub Actions workflow for testing, building, and deploying

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required permissions for GHCR push
permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: '3.10'
  DOCKER_IMAGE: heart-disease-api
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ====================
  # Job 1: Lint & Format
  # ====================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: Run flake8
        run: |
          flake8 src/ api/ tests/ --max-line-length=120 --ignore=E501,W503,E203
        continue-on-error: true
      
      - name: Check code formatting with black
        run: |
          black --check --diff src/ api/ tests/
      
      - name: Check import sorting with isort
        run: |
          isort --profile black --check-only --diff src/ api/ tests/

  # ====================
  # Job 2: Unit Tests
  # ====================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov=api --cov-report=xml --cov-report=html --junitxml=test-results.xml
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ====================
  # Job 3: Train Model
  # ====================
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download and prepare data
        run: |
          mkdir -p data
          # Use existing data or download
          if [ -f "heart_disease_data/processed.cleveland.data" ]; then
            echo "Data already exists"
          else
            chmod +x download_data.sh
            ./download_data.sh
          fi
      
      - name: Train model
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.data_processing import prepare_data
          from src.feature_engineering import create_preprocessing_pipeline
          from src.model import get_model, evaluate_model, save_model
          import joblib
          import os
          
          # Prepare data
          X_train, X_test, y_train, y_test = prepare_data('heart_disease_data/processed.cleveland.data')
          
          # Create and fit preprocessor
          preprocessor = create_preprocessing_pipeline()
          X_train_processed = preprocessor.fit_transform(X_train)
          X_test_processed = preprocessor.transform(X_test)
          
          # Train model
          model = get_model('random_forest')
          model.fit(X_train_processed, y_train)
          
          # Evaluate
          metrics = evaluate_model(model, X_test_processed, y_test)
          print(f'Model metrics: {metrics}')
          
          # Save artifacts
          os.makedirs('models', exist_ok=True)
          joblib.dump(model, 'models/model.pkl')
          joblib.dump(preprocessor, 'models/preprocessor.pkl')
          print('Model and preprocessor saved!')
          "
      
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: models/

  # ====================
  # Job 4: Build Docker
  # ====================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: models/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true  # Don't fail workflow if push fails (permissions)
      
      - name: Build Docker image (local test)
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:test .
          echo "Docker image built successfully!"
      
      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8000:8000 ${{ env.DOCKER_IMAGE }}:test
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
          docker rm test-container

  # ====================
  # Job 5: Deploy (Manual)
  # ====================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Deploy to Kubernetes
        run: |
          echo "Deployment would happen here"
          echo "Apply Kubernetes manifests:"
          echo "kubectl apply -f deployment/kubernetes/"
        # Uncomment below for actual deployment:
        # env:
        #   KUBECONFIG: ${{ secrets.KUBECONFIG }}
        # run: |
        #   kubectl apply -f deployment/kubernetes/
        #   kubectl rollout status deployment/heart-disease-api

  # ====================
  # Job 6: Summary
  # ====================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, train, build]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Train | ${{ needs.train.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
