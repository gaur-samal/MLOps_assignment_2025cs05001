# Heart Disease API - Kubernetes Ingress
# Routes external traffic to the service

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: heart-disease-api-ingress
  labels:
    app: heart-disease-api
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: heart-disease-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: heart-disease-api
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: heart-disease-api
                port:
                  number: 80
  # TLS configuration (uncomment for HTTPS)
  # tls:
  #   - hosts:
  #       - heart-disease-api.local
  #     secretName: heart-disease-tls
